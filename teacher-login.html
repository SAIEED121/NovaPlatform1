<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaPlatform | تسجيل دخول المعلمين</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #dcd9d4;
            background-image: linear-gradient(to bottom, rgba(220, 217, 212, 0.8), rgba(220, 217, 212, 0.8)), url('https://www.transparenttextures.com/patterns/gray-lines.png');
            background-attachment: fixed;
        }
        .main-card {
            background-color: #1a1a1a;
            border: 1px solid #333;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }
        .btn-burgundy {
            background-color: #801A24;
            transition: background-color 0.2s;
        }
        .btn-burgundy:hover {
            background-color: #a32230;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between font-sans antialiased text-gray-200">

    <!-- الهيدر العلوي وفيه اسم المنصة وزرار رجوع للرئيسية -->
    <header class="w-full p-6 bg-transparent relative z-10">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="text-2xl md:text-3xl font-black tracking-tight text-[#801A24]">
                Nova<span class="font-light text-gray-800">Platform</span>
            </div>
            <a href="index.html" class="text-sm font-bold text-gray-800 hover:text-[#801A24] transition flex items-center gap-1">
                <i class="fa-solid fa-arrow-right"></i> العودة للرئيسية
            </a>
        </div>
    </header>

    <!-- المحتوى الرئيسي: كارت تسجيل دخول المعلمين فقط -->
    <main class="w-full max-w-md mx-auto my-auto p-4 relative z-10">
        <div class="main-card rounded-2xl p-8 flex flex-col justify-between">
            
            <!-- عنوان الكارت -->
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-[#111] border border-gray-800 rounded-2xl flex items-center justify-center mx-auto mb-3 text-[#801A24]">
                    <i class="fa-solid fa-chalkboard-user text-2xl"></i>
                </div>
                <p class="text-lg md:text-xl font-semibold text-gray-100 text-center leading-relaxed">
                    مرحباً بك كعضو مميز في تيم <span class="text-[#a32230] font-bold">Nova</span>
                </p>
            </div>

            <!-- استمارة تسجيل الدخول المباشرة -->
            <form id="form-teacher-login" class="space-y-4">
                
                <!-- خانة البريد الإلكتروني -->
                <div class="flex flex-col space-y-1">
                    <label class="text-xs font-semibold text-gray-300">البريد الإلكتروني الحسابي</label>
                    <input id="teacher-email" name="teacher-email" type="email" placeholder="teacher@novaplatform.com" class="p-3 bg-[#111] border border-gray-800 rounded-xl text-white text-sm outline-none focus:border-[#801A24]" required>
                </div>

                <!-- خانة كلمة المرور -->
                <div class="flex flex-col space-y-1">
                    <label class="text-xs font-semibold text-gray-300">كلمة المرور</label>
                    <input id="teacher-password" name="teacher-password" type="password" placeholder="••••••••" class="p-3 bg-[#111] border border-gray-800 rounded-xl text-white text-sm outline-none focus:border-[#801A24]" required>
                </div>

                <!-- زر الدخول المباشر للوحة المعلم -->
                <button type="submit" class="btn-burgundy w-full py-3 rounded-xl text-white font-bold text-xs tracking-wide uppercase mt-4">
                    دخول لوحة التحكم الذكية
                </button>
                <div id="teacher-login-alert" class="hidden mt-3 rounded-lg border border-[#801A24]/40 bg-[#801A24]/10 px-3 py-2 text-sm text-[#f5c2c7] text-center"></div>
            </form>

            <!-- تنويه أمان أسفل الكارت -->
            <div class="mt-6 pt-4 border-t border-gray-800 text-center">
                <p class="text-[10px] text-gray-500 leading-relaxed">
                    <i class="fa-solid fa-lock text-[#801A24] ml-1"></i>
                    هذه البوابة مغلقة ومحمية. إذا لم يكن لديك حساب، يرجى مراجعة الدعم الفني للمنصة.
                </p>
            </div>

        </div>
    </main>

    <!-- الفوتر السفلي -->
    <footer class="w-full text-center text-xs text-gray-500 py-6 bg-transparent relative z-10">
        &copy; 2026 NovaPlatform. جميع الحقوق محفوظة.
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const form = document.getElementById('form-teacher-login');
            const emailInput = document.getElementById('teacher-email');
            const passwordInput = document.getElementById('teacher-password');
            const alertBox = document.getElementById('teacher-login-alert');

            if (!form || !emailInput || !passwordInput) return;

            form.addEventListener('submit', function (event) {
                event.preventDefault();

                const enteredEmail = emailInput.value.trim();
                const enteredPassword = passwordInput.value;

                if (enteredEmail === 'teacher@nova.com' && enteredPassword === 'teacher123') {
                    if (alertBox) {
                        alertBox.textContent = '';
                        alertBox.classList.add('hidden');
                    }
                    window.location.href = 'teacher.html';
                    return;
                }

                if (alertBox) {
                    alertBox.textContent = 'عذراً، البريد الإلكتروني أو كلمة المرور غير صحيحة!';
                    alertBox.classList.remove('hidden');
                } else {
                    alert('عذراً، البريد الإلكتروني أو كلمة المرور غير صحيحة!');
                }
            });
        });
    </script>

</body>
</html>
