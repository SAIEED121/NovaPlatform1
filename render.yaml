databases:
  - name: novaplatform-db
    plan: free
    databaseName: novaplatform
    user: novaplatform

services:
  - type: web
    name: novaplatform-backend
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python manage.py migrate
      python manage.py collectstatic --noinput
    startCommand: gunicorn novaplatform_backend.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: novaplatform-db
          property: connectionString
      - key: DJANGO_DEBUG
        value: "False"
      - key: SECRET_KEY
        sync: false
      - key: RENDER_EXTERNAL_HOSTNAME
        sync: false
