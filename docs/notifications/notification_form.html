<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Notification</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">
<div class="max-w-3xl mx-auto p-6">
    {% if messages %}
    <div class="mb-4 space-y-2">
        {% for message in messages %}
        <div class="rounded border px-3 py-2 text-sm {% if message.tags == 'error' %}border-rose-300 bg-rose-50 text-rose-700{% elif message.tags == 'success' %}border-emerald-300 bg-emerald-50 text-emerald-700{% else %}border-slate-300 bg-white text-slate-700{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <form method="post" class="bg-white rounded shadow p-6 space-y-4">
        {% csrf_token %}
        <h1 class="text-2xl font-bold">Create Notification</h1>
        {{ form.as_p }}
        <div class="space-x-2">
            <button class="px-4 py-2 bg-blue-700 text-white rounded" type="submit">Save notification</button>
            <a class="px-4 py-2 bg-slate-300 rounded" href="{% url 'notifications:notification_list' %}">Back to notifications</a>
        </div>
    </form>
</div>
</body>
</html>
