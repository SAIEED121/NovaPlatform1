<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">
<div class="max-w-3xl mx-auto p-6">
    <div class="bg-white rounded shadow p-6 space-y-3">
        <h1 class="text-2xl font-bold">{{ category.name }}</h1>
        <p class="text-slate-700">{{ category.description|default:"No description" }}</p>
        <p class="text-sm text-slate-600">Status: {% if category.status %}Active{% else %}Inactive{% endif %}</p>
        <div class="space-x-2">
            <a class="text-blue-700" href="{% url 'courses:category_update' category.pk %}">Edit</a>
            <a class="text-rose-700" href="{% url 'courses:category_delete' category.pk %}">Delete</a>
            <a class="text-slate-700" href="{% url 'courses:category_list' %}">Back</a>
        </div>
    </div>
</div>
</body>
</html>
