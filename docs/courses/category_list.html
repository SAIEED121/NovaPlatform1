<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-900">
<div class="max-w-6xl mx-auto p-6 space-y-4">
    <div class="flex justify-between items-center">
        <h1 class="text-2xl font-bold">Course Categories</h1>
        <a class="px-4 py-2 bg-blue-700 text-white rounded" href="{% url 'courses:category_create' %}">Add Category</a>
    </div>
    <div class="text-sm text-slate-600 flex gap-4">
        <a href="{% url 'courses:course_list' %}">Courses</a>
        <a href="{% url 'courses:lesson_list' %}">Lessons</a>
        <a href="{% url 'courses:schedule_list' %}">Schedules</a>
        <a href="{% url 'courses:enrollment_list' %}">Enrollments</a>
    </div>
    <div class="bg-white rounded shadow overflow-x-auto">
        <table class="w-full text-sm">
            <thead class="bg-slate-200">
                <tr>
                    <th class="text-left p-3">Name</th>
                    <th class="text-left p-3">Status</th>
                    <th class="text-left p-3">Actions</th>
                </tr>
            </thead>
            <tbody>
            {% for category in categories %}
                <tr class="border-t">
                    <td class="p-3">{{ category.name }}</td>
                    <td class="p-3">{% if category.status %}Active{% else %}Inactive{% endif %}</td>
                    <td class="p-3 space-x-2">
                        <a class="text-blue-700" href="{% url 'courses:category_detail' category.pk %}">View Details</a>
                        <a class="text-amber-700" href="{% url 'courses:category_update' category.pk %}">Edit</a>
                        <a class="text-rose-700" href="{% url 'courses:category_delete' category.pk %}">Delete</a>
                    </td>
                </tr>
            {% empty %}
                <tr><td colspan="3" class="p-3 text-slate-500">No categories are available yet.</td></tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
