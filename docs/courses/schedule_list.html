<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedules</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">
<div class="max-w-7xl mx-auto p-6 space-y-4">
    <div class="flex justify-between items-center">
        <h1 class="text-2xl font-bold">Schedules</h1>
        <a class="px-4 py-2 bg-blue-700 text-white rounded" href="{% url 'courses:schedule_create' %}">Add Schedule</a>
    </div>
    <div class="bg-white rounded shadow overflow-x-auto">
        <table class="w-full text-sm">
            <thead class="bg-slate-200">
                <tr>
                    <th class="p-3 text-left">Course</th>
                    <th class="p-3 text-left">Title</th>
                    <th class="p-3 text-left">Start</th>
                    <th class="p-3 text-left">End</th>
                    <th class="p-3 text-left">Actions</th>
                </tr>
            </thead>
            <tbody>
            {% for schedule in schedules %}
                <tr class="border-t">
                    <td class="p-3">{{ schedule.course.code }}</td>
                    <td class="p-3">{{ schedule.title }}</td>
                    <td class="p-3">{{ schedule.starts_at|date:"Y-m-d H:i" }}</td>
                    <td class="p-3">{{ schedule.ends_at|date:"Y-m-d H:i" }}</td>
                    <td class="p-3 space-x-2">
                        <a class="text-blue-700" href="{% url 'courses:schedule_detail' schedule.pk %}">View Details</a>
                        <a class="text-amber-700" href="{% url 'courses:schedule_update' schedule.pk %}">Edit</a>
                        <a class="text-rose-700" href="{% url 'courses:schedule_delete' schedule.pk %}">Delete</a>
                    </td>
                </tr>
            {% empty %}
                <tr><td colspan="5" class="p-3 text-slate-500">No schedules are available yet.</td></tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
