{% extends "base.html" %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="container py-5">

        <div class="card-body p-4 p-md-5 text-center">
            <h1 class="h3 mb-2">404 - Page Not Found</h1>

            <a href="{% url 'home' %}" class="btn btn-primary">Back to Home</a>
        </div>
    </div>
</div>
{% endblock %}
