<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaPlatform | صورة الملف الشخصي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #dcd9d4;
            background-image: linear-gradient(to bottom, rgba(220, 217, 212, 0.9), rgba(220, 217, 212, 0.95));
            font-family: "Cairo", sans-serif;
        }
        .panel {
            background-color: #1a1a1a;
            border: 1px solid #2b2b2b;
            border-radius: 16px;
        }
    </style>
</head>
<body class="min-h-screen text-gray-200">
    <main class="max-w-3xl mx-auto p-4 md:p-8">
        <section class="panel p-6 md:p-8 space-y-5">
            <h1 class="text-lg font-black text-white">رفع صورة الملف الشخصي</h1>
            <p class="text-xs text-gray-400">الأنواع المسموحة: JPG, PNG, WEBP, GIF. الحد الأقصى: 5MB.</p>

            {% if messages %}
                {% for message in messages %}
                    <div class="rounded-xl px-4 py-3 text-xs {% if message.tags == 'success' %}bg-emerald-900/50 text-emerald-300{% else %}bg-rose-900/40 text-rose-300{% endif %}">{{ message }}</div>
                {% endfor %}
            {% endif %}

            {% if profile and profile.profile_photo %}
            <div class="space-y-2">
                <p class="text-xs text-gray-400">الصورة الحالية</p>
                <img src="{{ profile.profile_photo.url }}" alt="Profile Photo" class="w-28 h-28 rounded-full object-cover border border-gray-700">
            </div>
            {% endif %}

            <form method="post" enctype="multipart/form-data" class="space-y-4">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="flex items-center gap-2">
                    <button type="submit" class="px-5 py-2 rounded-lg bg-[#801A24] hover:bg-[#6d141d] text-xs font-bold">حفظ الصورة</button>
                    <a href="{% url 'home' %}" class="px-5 py-2 rounded-lg bg-zinc-700 hover:bg-zinc-600 text-xs font-bold">العودة</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
