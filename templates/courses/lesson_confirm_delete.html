<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Lesson</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">
<div class="max-w-2xl mx-auto p-6">
    <form method="post" class="bg-white rounded shadow p-6 space-y-4">
        {% csrf_token %}
        <h1 class="text-xl font-bold">Delete Lesson</h1>
        <p>Are you sure you want to delete "{{ object.title }}"?</p>
        <div class="space-x-2">
            <button class="px-4 py-2 bg-rose-700 text-white rounded" type="submit">Delete</button>
            <a class="px-4 py-2 bg-slate-300 rounded" href="{% url 'courses:lesson_list' %}">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
