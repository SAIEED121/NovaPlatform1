<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lessons</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">
<div class="max-w-7xl mx-auto p-6 space-y-4">
    <div class="flex justify-between items-center">
        <h1 class="text-2xl font-bold">Lessons</h1>
        <a class="px-4 py-2 bg-blue-700 text-white rounded" href="{% url 'courses:lesson_create' %}">Add Lesson</a>
    </div>
    <div class="bg-white rounded shadow overflow-x-auto">
        <table class="w-full text-sm">
            <thead class="bg-slate-200">
                <tr>
                    <th class="p-3 text-left">Course</th>
                    <th class="p-3 text-left">Order</th>
                    <th class="p-3 text-left">Title</th>
                    <th class="p-3 text-left">Published</th>
                    <th class="p-3 text-left">Actions</th>
                </tr>
            </thead>
            <tbody>
            {% for lesson in lessons %}
                <tr class="border-t">
                    <td class="p-3">{{ lesson.course.code }}</td>
                    <td class="p-3">{{ lesson.order }}</td>
                    <td class="p-3">{{ lesson.title }}</td>
                    <td class="p-3">{% if lesson.is_published %}Yes{% else %}No{% endif %}</td>
                    <td class="p-3 space-x-2">
                        <a class="text-blue-700" href="{% url 'courses:lesson_detail' lesson.pk %}">View Details</a>
                        <a class="text-amber-700" href="{% url 'courses:lesson_update' lesson.pk %}">Edit</a>
                        <a class="text-rose-700" href="{% url 'courses:lesson_delete' lesson.pk %}">Delete</a>
                    </td>
                </tr>
            {% empty %}
                <tr><td colspan="5" class="p-3 text-slate-500">No lessons are available yet.</td></tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
