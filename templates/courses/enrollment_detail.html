<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enrollment Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">
<div class="max-w-3xl mx-auto p-6">
    <div class="bg-white rounded shadow p-6 space-y-2">
        <h1 class="text-2xl font-bold">Enrollment Detail</h1>
        <p>Student: {{ enrollment.student.student_code }}</p>
        <p>Course: {{ enrollment.course.code }} - {{ enrollment.course.title }}</p>
        <p>Status: {{ enrollment.get_status_display }}</p>
        <p>Progress: {{ enrollment.progress_percent }}%</p>
        <div class="space-x-2">
            <a class="text-amber-700" href="{% url 'courses:enrollment_update' enrollment.pk %}">Edit</a>
            <a class="text-slate-700" href="{% url 'courses:enrollment_list' %}">Back</a>
        </div>
    </div>
</div>
</body>
</html>
