<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assign Teacher</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">
<div class="max-w-3xl mx-auto p-6">
    <form method="post" class="bg-white rounded shadow p-6 space-y-4">
        {% csrf_token %}
        <h1 class="text-2xl font-bold">Assign Teacher for {{ object.code }}</h1>
        {{ form.as_p }}
        <div class="space-x-2">
            <button class="px-4 py-2 bg-emerald-700 text-white rounded" type="submit">Assign</button>
            <a class="px-4 py-2 bg-slate-300 rounded" href="{% url 'courses:course_list' %}">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
