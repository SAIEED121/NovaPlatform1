<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NovaPlatform{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --nova-primary: #801A24;
            --nova-primary-hover: #6d141d;
            --nova-bg: #dcd9d4;
            --nova-surface: #ffffff;
            --nova-border: #ddd6cf;
            --nova-shadow: 0 12px 24px rgba(17, 24, 39, 0.08);
        }

        body {
            background-color: var(--nova-bg);
            background-image: linear-gradient(to bottom, rgba(220, 217, 212, 0.92), rgba(220, 217, 212, 0.92));
            font-family: "Cairo", "Segoe UI", Tahoma, sans-serif;
            color: #1f2937;
        }

        main {
            padding: 0.5rem 0;
        }

        .container,
        .container-fluid {
            max-width: 1100px;
        }

        .card {
            border: 1px solid var(--nova-border);
            border-radius: 14px;
            box-shadow: var(--nova-shadow);
            background-color: var(--nova-surface);
        }

        .btn {
            border-radius: 10px;
            font-weight: 700;
            transition: transform 0.15s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(17, 24, 39, 0.15);
        }

        .btn-primary {
            background-color: var(--nova-primary);
            border-color: var(--nova-primary);
        }

        .btn-primary:hover,
        .btn-primary:focus {
            background-color: var(--nova-primary-hover);
            border-color: var(--nova-primary-hover);
        }

        .form-control,
        .form-select {
            border-radius: 10px;
            border-color: #d4cfc8;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #b26d74;
            box-shadow: 0 0 0 0.2rem rgba(128, 26, 36, 0.18);
        }

        .table {
            --bs-table-bg: transparent;
        }

        .table > :not(caption) > * > * {
            padding: 0.8rem 0.75rem;
            vertical-align: middle;
        }

        .table thead th {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: #6b7280;
        }

        .table-hover tbody tr:hover {
            background-color: rgba(128, 26, 36, 0.05);
        }

        .nova-empty-state {
            border: 1px dashed #c9c1b8;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.78);
        }

        .btn.is-loading {
            pointer-events: none;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <main>
        {% block content %}{% endblock %}
    </main>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            document.querySelectorAll("form").forEach(function (form) {
                form.addEventListener("submit", function () {
                    const submitButton = form.querySelector("button[type='submit']");
                    if (!submitButton) {
                        return;
                    }

                    submitButton.classList.add("is-loading");
                    submitButton.dataset.originalText = submitButton.textContent;
                    submitButton.textContent = "Processing...";
                });
            });
        });
    </script>
</body>
</html>
