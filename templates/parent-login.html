<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaPlatform | تسجيل دخول ولي الأمر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #dcd9d4;
            background-image: linear-gradient(to bottom, rgba(220, 217, 212, 0.8), rgba(220, 217, 212, 0.8)), url('https://www.transparenttextures.com/patterns/gray-lines.png');
            background-attachment: fixed;
        }
        .main-card {
            background-color: #1a1a1a;
            border: 1px solid #333;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }
        .btn-burgundy {
            background-color: #801A24;
            transition: background-color 0.2s;
        }
        .btn-burgundy:hover {
            background-color: #a32230;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between font-sans antialiased text-gray-200">
    <header class="w-full p-6 bg-transparent relative z-10">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="text-2xl md:text-3xl font-black tracking-tight text-[#801A24]">
                Nova<span class="font-light text-gray-800">Platform</span>
            </div>
            <a href="{% url 'home' %}" class="text-sm font-bold text-gray-800 hover:text-[#801A24] transition flex items-center gap-1">
                <i class="fa-solid fa-arrow-right"></i> العودة للرئيسية
            </a>
        </div>
    </header>

    <main class="w-full max-w-md mx-auto my-auto p-4 relative z-10">
        <div class="main-card rounded-2xl p-8 flex flex-col justify-between">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-[#111] border border-gray-800 rounded-2xl flex items-center justify-center mx-auto mb-3 text-[#801A24]">
                    <i class="fa-solid fa-people-roof text-2xl"></i>
                </div>
                <h2 class="text-xl font-bold text-white">بوابة ولي الأمر</h2>
                <p class="text-xs text-gray-400 mt-1">متابعة آمنة للمؤشرات التعليمية والتنبيهات</p>
            </div>

            <form class="space-y-4" method="POST" action="{% url 'parent_login' %}">
                {% csrf_token %}
                <div class="flex flex-col space-y-1">
                    <label class="text-xs font-semibold text-gray-300">اسم المستخدم</label>
                    <input name="username" type="text" placeholder="parent_username" class="p-3 bg-[#111] border border-gray-800 rounded-xl text-white text-sm outline-none focus:border-[#801A24]" required>
                </div>

                <div class="flex flex-col space-y-1">
                    <label class="text-xs font-semibold text-gray-300">كلمة المرور</label>
                    <input name="password" type="password" placeholder="••••••••" class="p-3 bg-[#111] border border-gray-800 rounded-xl text-white text-sm outline-none focus:border-[#801A24]" required>
                </div>

                {% if messages %}
                    {% for message in messages %}
                        <div class="mt-3 rounded-lg border border-[#801A24]/40 bg-[#801A24]/10 px-3 py-2 text-sm text-[#f5c2c7] text-center">{{ message }}</div>
                    {% endfor %}
                {% endif %}

                <button type="submit" class="btn-burgundy w-full py-3 rounded-xl text-white font-bold">
                    دخول بوابة ولي الأمر
                </button>
            </form>
        </div>
    </main>

    <footer class="w-full text-center text-xs text-gray-500 py-6 bg-transparent relative z-10">
        &copy; 2026 NovaPlatform. جميع الحقوق محفوظة.
    </footer>
</body>
</html>
