{% extends "base.html" %}

{% block title %}Server Error{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="card border-0 shadow-sm nova-empty-state mx-auto" style="max-width: 640px;">
        <div class="card-body p-4 p-md-5 text-center">
            <h1 class="h3 mb-2">500 - Server Error</h1>
            <p class="text-muted mb-4">Something went wrong while processing your request. Please try again.</p>
            <a href="{% url 'home' %}" class="btn btn-primary">Back to Home</a>
        </div>
    </div>
</div>
{% endblock %}
