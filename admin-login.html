<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaPlatform | تسجيل دخول الإدارة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #dcd9d4;
            background-image: linear-gradient(to bottom, rgba(220, 217, 212, 0.8), rgba(220, 217, 212, 0.8)), url('https://www.transparenttextures.com/patterns/gray-lines.png');
            background-attachment: fixed;
        }
        .main-card {
            background-color: #1a1a1a;
            border: 1px solid #333;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }
        .btn-burgundy {
            background-color: #801A24;
            transition: background-color 0.2s;
        }
        .btn-burgundy:hover {
            background-color: #a32230;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between font-sans antialiased text-gray-200">

    <!-- الهيدر العلوي وفيه اسم المنصة وزرار رجوع للرئيسية -->
    <header class="w-full p-6 bg-transparent relative z-10">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="text-2xl md:text-3xl font-black tracking-tight text-[#801A24]">
                Nova<span class="font-light text-gray-800">Platform</span>
            </div>
            <a href="index.html" class="text-sm font-bold text-gray-800 hover:text-[#801A24] transition flex items-center gap-1">
                <i class="fa-solid fa-arrow-right"></i> العودة للرئيسية
            </a>
        </div>
    </header>

    <!-- المحتوى الرئيسي: كارت تسجيل دخول الإدارة العليا -->
    <main class="w-full max-w-md mx-auto my-auto p-4 relative z-10">
        <div class="main-card rounded-2xl p-8 flex flex-col justify-between">
            
            <!-- عنوان الكارت كأنه لوحة تحكم أمنية -->
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-[#111] border border-gray-800 rounded-2xl flex items-center justify-center mx-auto mb-3 text-[#801A24]">
                    <i class="fa-solid fa-shield-halved text-2xl"></i>
                </div>
                <h2 class="text-xl font-bold text-white">لوحة تحكم الإدارة</h2>
                <p class="text-xs text-gray-400 mt-1">منطقة محمية خاصة بمديري ومطوري المنصة</p>
            </div>

            <!-- استمارة تسجيل الدخول المباشرة -->
            <form id="form-admin-login" class="space-y-4">
                
                <!-- خانة البريد الإلكتروني للمسؤول -->
                <div class="flex flex-col space-y-1">
                    <label class="text-xs font-semibold text-gray-300">بريد المسؤول (Admin Email)</label>
                    <input id="admin-email" type="email" placeholder="admin@novaplatform.com" class="p-3 bg-[#111] border border-gray-800 rounded-xl text-white text-sm outline-none focus:border-[#801A24]" required>
                </div>

                <!-- خانة كلمة المرور الصارمة -->
                <div class="flex flex-col space-y-1">
                    <label class="text-xs font-semibold text-gray-300">رمز المرور الأمني</label>
                    <input id="admin-password" type="password" placeholder="••••••••••••" class="p-3 bg-[#111] border border-gray-800 rounded-xl text-white text-sm outline-none focus:border-[#801A24]" required>
                </div>

                <div id="error-msg" class="hidden text-[11px] text-rose-400 bg-rose-500/10 border border-rose-500/20 p-2.5 rounded-xl text-center font-bold">
                    <i class="fa-solid fa-circle-exclamation"></i> عذراً، خطأ في بيانات الاعتماد الأمنية!
                </div>

                <!-- زر تسجيل الدخول للوحة الإدارة الكبيرة -->
                <button type="submit" class="btn-burgundy w-full py-3 rounded-xl text-white font-bold text-xs tracking-wide uppercase mt-4">
                    ولوج بصلاحيات المدير
                </button>
            </form>

            <!-- تنويه تشفير أسفل الكارت -->
            <div class="mt-6 pt-4 border-t border-gray-800 text-center">
                <p class="text-[10px] text-gray-500 leading-relaxed">
                    <i class="fa-solid fa-eye-slash text-[#801A24] ml-1"></i>
                    يتم مراقبة وتشفير جميع عمليات الدخول إلى هذه اللوحة لحماية بيانات الطلاب والمدرسين.
                </p>
            </div>

        </div>
    </main>

    <!-- الفوتر السفلي -->
    <footer class="w-full text-center text-xs text-gray-500 py-6 bg-transparent relative z-10">
        &copy; 2026 NovaPlatform. جميع الحقوق محفوظة.
    </footer>

    <script>
    document.getElementById('form-admin-login').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const email = document.getElementById('admin-email').value;
        const password = document.getElementById('admin-password').value;
        const errorMsg = document.getElementById('error-msg');

        if (email === "admin@novaplatform.com" && password === "nova2026") {
            errorMsg.classList.add('hidden');
            window.location.href = "admin.html";
        } else {
            errorMsg.classList.remove('hidden');
        }
    });
    </script>

</body>
</html>
